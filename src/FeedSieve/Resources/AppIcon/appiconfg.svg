<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
	<!--
    Foreground for MAUI adaptive icon. Transparent background.
    6 identical funnels radiate from a central amber circle at 60-degree steps.
    Funnel mouth points OUTWARD; stem points toward the amber center.
    Color mapping (clockwise from top):
       0   top          -> AMBER
       60  upper-right  -> WHITE
       120 lower-right  -> GREY
       180 bottom       -> WHITE
       240 lower-left   -> GREY
       300 upper-left   -> WHITE
    => 1 amber + 3 white + 2 grey. Scaled to 0.86 for the Android safe zone.
  -->
	<g transform="translate(512 512) scale(0.86) translate(-512 -512)">

		<defs>
			<!-- Funnel authored at the TOP slot: wide bowl rim (y=150) tapering
           with concave sides to a stem reaching toward the center (y=452). -->
			<path id="funnel"
			      d="M 398 150
               L 626 150
               C 626 262 556 300 540 372
               L 540 452
               L 484 452
               L 484 372
               C 468 300 398 262 398 150 Z"/>
		</defs>

		<!-- AMBER funnel: top -->
		<use href="#funnel" fill="#F1960A" transform="rotate(0   512 512)"/>

		<!-- WHITE funnels: upper-right, bottom, upper-left -->
		<use href="#funnel" fill="#FFFFFF" transform="rotate(60  512 512)"/>
		<use href="#funnel" fill="#FFFFFF" transform="rotate(180 512 512)"/>
		<use href="#funnel" fill="#FFFFFF" transform="rotate(300 512 512)"/>

		<!-- GREY funnels: lower-right, lower-left -->
		<use href="#funnel" fill="#909090" transform="rotate(120 512 512)"/>
		<use href="#funnel" fill="#909090" transform="rotate(240 512 512)"/>

		<!-- Central amber circle, drawn on top of the stems -->
		<circle cx="512" cy="512" r="74" fill="#F1960A"/>

	</g>
</svg>