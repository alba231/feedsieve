name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '**/*.sln'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - '.github/workflows/build_deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - '**/*.csproj'
      - '**/*.sln'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - '.github/workflows/build_deploy.yml'
  workflow_dispatch:

# Cancel superseded runs on PRs; never cancel on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  checks: write          # required by dorny/test-reporter
  pull-requests: write   # required by dorny/test-reporter to comment

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  CONFIGURATION: 'Release'
  TEST_PROJECT: 'tests/FeedSieve.Tests.Unit/FeedSieve.Tests.Unit.csproj'
  APP_PROJECT:  'src/FeedSieve/FeedSieve.csproj'

jobs:
  # ---------------------------------------------------------------------------
  # Fast feedback: build + test the library/unit tests on Linux.
  # No MAUI workload needed — test project must not transitively reference
  # the MAUI head; it should only reference Core / Providers / Infrastructure.
  # ---------------------------------------------------------------------------
  test:
    name: Test (unit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore ${{ env.TEST_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.TEST_PROJECT }} --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Test
        run: |
          dotnet test ${{ env.TEST_PROJECT }} \
            --configuration ${{ env.CONFIGURATION }} --no-build \
            --logger "trx;LogFileName=unit.trx" \
            --logger "console;verbosity=minimal" \
            --results-directory TestResults \
            --collect:"XPlat Code Coverage"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET test report
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # MAUI Android: build APK to verify the Android head compiles end-to-end.
  # No signing — that's a Phase 2 concern.
  # `dotnet workload restore` installs whatever workloads the csproj declares;
  # assumes conditional <TargetFrameworks> so this runner only sees -android.
  # ---------------------------------------------------------------------------
  build-android:
    name: Build (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: '17'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-maui-android-${{ hashFiles('**/packages.lock.json', '**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-maui-android-
            nuget-${{ runner.os }}-

      - name: Restore workloads
        run: dotnet workload restore ${{ env.APP_PROJECT }}

      - name: Restore
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: |
          dotnet build ${{ env.APP_PROJECT }} \
            --configuration ${{ env.CONFIGURATION }} \
            --framework net10.0-android \
            --no-restore \
            -p:AndroidPackageFormat=apk \
            -p:RunAOTCompilation=false

      - name: Upload Android artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src/FeedSieve/bin/${{ env.CONFIGURATION }}/net10.0-android/**/*-Signed.apk
          retention-days: 14
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # MAUI Windows: build to verify the Windows head compiles.
  # Requires windows runner. Slower; runs in parallel with Android.
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\.nuget\packages
          key: nuget-${{ runner.os }}-maui-windows-${{ hashFiles('**/packages.lock.json', '**/*.csproj', 'Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-maui-windows-
            nuget-${{ runner.os }}-

      - name: Restore workloads
        run: dotnet workload restore ${{ env.APP_PROJECT }}

      - name: Restore
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: |
          dotnet build ${{ env.APP_PROJECT }} `
            --configuration ${{ env.CONFIGURATION }} `
            --framework net10.0-windows10.0.19041.0 `
            --no-restore `
            -p:WindowsPackageType=None `
            -p:GenerateAppxPackageOnBuild=false

      - name: Upload Windows artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src/FeedSieve/bin/${{ env.CONFIGURATION }}/net10.0-windows10.0.19041.0/**/FeedSieve.exe
          retention-days: 14
          if-no-files-found: error